services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-mvp}'
      - 'POSTGRES_USER=${POSTGRES_USER:-postgres}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}'
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: 'redis:7'
    ports:
      - '6379:6379'

volumes:
  pgdata:
