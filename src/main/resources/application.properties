spring.application.name=mvp
spring.mvc.problemdetails.enabled=true


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mvp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:psql}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Identity auth token lifetimes & login-lockout (ID-FR-03..05, NFR-04)
identity.auth.access-token-ttl=15m
identity.auth.refresh-token-ttl=30d
identity.auth.login-attempts-window=15m
identity.auth.login-lock-ttl=15m
identity.auth.max-login-attempts=5

# Flyway Migration Locations
spring.flyway.locations=classpath:db/migration/shared,classpath:db/migration/identity,classpath:db/migration/tenant,classpath:db/migration/studio,classpath:db/migration/catalog,classpath:db/migration/social,classpath:db/migration/reading,classpath:db/migration/billing,classpath:db/migration/analytics

# Explicit Flyway Settings
spring.flyway.enabled=true
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.modulith.runtime.flyway-enabled=true

# Catalog media upload (local filesystem for MVP)
catalog.media.upload-dir=uploads
catalog.media.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


