spring.application.name=mvp


spring.datasource.url=jdbc:postgresql://localhost:5432/mvp
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration Locations
spring.flyway.locations=classpath:db/migration/identity,classpath:db/migration/tenant,classpath:db/migration/catalog,classpath:db/migration/social,classpath:db/migration/billing,classpath:db/migration/reading

# Explicit Flyway Settings
spring.flyway.enabled=true
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.modulith.runtime.flyway-enabled=true

# Catalog media upload (local filesystem for MVP)
catalog.media.upload-dir=uploads
catalog.media.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


